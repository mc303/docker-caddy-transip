name: Daily Build

on:
  schedule:
    - cron: '0 2 * 1 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      caddy_version: ${{ steps.check.outputs.caddy_version }}
    
    steps:
      - name: Get latest Caddy version
        id: caddy
        run: |
          VERSION=$(curl -s https://api.github.com/repos/caddyserver/caddy/releases/latest | jq -r '.tag_name')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_short=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Get current image version
        id: current
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT=$(gh api /users/mc303/packages/container/caddy-transip/versions --jq '.[0].metadata.container.tags | .[] | select(. != "latest")' | head -1 || echo "none")
          echo "version=${CURRENT}" >> $GITHUB_OUTPUT

      - name: Check if build needed
        id: check
        run: |
          if [ "${{ steps.current.outputs.version }}" != "${{ steps.caddy.outputs.version_short }}" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "caddy_version=${{ steps.caddy.outputs.version_short }}" >> $GITHUB_OUTPUT
            echo "Build needed: ${{ steps.caddy.outputs.version_short }}"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "No build needed, versions match"
          fi

  build:
    needs: check-and-build
    if: needs.check-and-build.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ghcr.io/mc303/caddy-transip:latest
            ghcr.io/mc303/caddy-transip:${{ needs.check-and-build.outputs.caddy_version }}
          build-args: |
            CADDY_VERSION=${{ needs.check-and-build.outputs.caddy_version }}
